<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UK Textiles — Database Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset & Tokens ────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #6366f1;
  --accent-glow: rgba(99,102,241,.35);
  --accent2: #06b6d4;
  --green: #10b981;
  --yellow: #f59e0b;
  --red: #ef4444;
  --radius: 14px;
  --radius-sm: 8px;
  --font: 'Inter', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --anim: .22s cubic-bezier(.4,0,.2,1);
}

[data-theme="dark"] {
  --bg: #0a0b0f;
  --bg2: #111218;
  --bg3: #1a1b23;
  --bg4: #22232e;
  --border: rgba(255,255,255,.07);
  --border2: rgba(255,255,255,.13);
  --text: #e8eaf0;
  --text2: #9196a8;
  --text3: #5a5f75;
  --glass: rgba(255,255,255,.03);
  --glass2: rgba(255,255,255,.06);
  --shadow: 0 8px 40px rgba(0,0,0,.6);
}

[data-theme="light"] {
  --bg: #f0f2f8;
  --bg2: #ffffff;
  --bg3: #f5f6fa;
  --bg4: #ebedf5;
  --border: rgba(0,0,0,.07);
  --border2: rgba(0,0,0,.14);
  --text: #111827;
  --text2: #6b7280;
  --text3: #9ca3af;
  --glass: rgba(255,255,255,.7);
  --glass2: rgba(255,255,255,.9);
  --shadow: 0 8px 40px rgba(0,0,0,.12);
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  overflow-x: hidden;
}

/* ── Layout ──────────────────────────────────────────────── */
#sidebar {
  width: 260px;
  flex-shrink: 0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  transition: transform var(--anim);
}

#main {
  margin-left: 260px;
  flex: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Sidebar ─────────────────────────────────────────────── */
.sidebar-header {
  padding: 22px 20px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  box-shadow: 0 4px 14px var(--accent-glow);
  flex-shrink: 0;
}

.logo-text { font-size: 15px; font-weight: 700; line-height: 1.2; }
.logo-sub  { font-size: 11px; color: var(--text2); font-weight: 400; margin-top: 1px; }

.sidebar-section { padding: 16px 12px 8px; }

.sidebar-label {
  font-size: 10px; font-weight: 600; letter-spacing: .1em;
  text-transform: uppercase; color: var(--text3);
  padding: 0 8px; margin-bottom: 6px;
}

.sidebar-search {
  position: relative; margin: 0 12px 12px;
}

.sidebar-search input {
  width: 100%;
  padding: 9px 12px 9px 34px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 13px;
  font-family: var(--font);
  outline: none;
  transition: border-color var(--anim), box-shadow var(--anim);
}

.sidebar-search input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.sidebar-search .search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text3); font-size: 14px; pointer-events: none;
}

.table-list {
  flex: 1; overflow-y: auto; padding: 0 12px 12px;
}

.table-list::-webkit-scrollbar { width: 4px; }
.table-list::-webkit-scrollbar-track { background: transparent; }
.table-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.table-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background var(--anim), color var(--anim);
  color: var(--text2);
  font-size: 13.5px;
  font-weight: 500;
  text-decoration: none;
  position: relative;
}

.table-item:hover { background: var(--bg3); color: var(--text); }
.table-item.active { background: rgba(99,102,241,.15); color: var(--accent); }
.table-item.active::before {
  content: ''; position: absolute; left: 0; top: 20%; bottom: 20%;
  width: 3px; background: var(--accent); border-radius: 0 3px 3px 0;
}

.table-icon { font-size: 14px; opacity: .6; }

.table-badge {
  margin-left: auto; font-size: 10px; font-weight: 600;
  background: var(--bg4); color: var(--text3);
  padding: 1px 7px; border-radius: 20px;
  font-variant-numeric: tabular-nums;
}

.sidebar-footer {
  padding: 14px; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}

.connection-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: pulse-dot 2.5s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: .7; transform: scale(1.25); }
}

.conn-text { font-size: 12px; color: var(--text2); flex: 1; }
.conn-text strong { color: var(--text); font-weight: 600; }

/* ── Top Bar ─────────────────────────────────────────────── */
#topbar {
  height: 60px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 28px;
  gap: 16px;
  position: sticky; top: 0; z-index: 50;
}

.topbar-title { font-size: 16px; font-weight: 700; flex: 1; }
.topbar-sub { font-size: 12px; color: var(--text2); font-weight: 400; margin-left: 8px; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 600;
  cursor: pointer; border: none; outline: none;
  transition: all var(--anim);
  text-decoration: none;
}

.btn-ghost {
  background: transparent; color: var(--text2);
  border: 1px solid var(--border2);
}
.btn-ghost:hover { background: var(--bg3); color: var(--text); }

.btn-accent {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  box-shadow: 0 4px 14px var(--accent-glow);
}
.btn-accent:hover { transform: translateY(-1px); box-shadow: 0 6px 20px var(--accent-glow); }

/* ── Content Area ────────────────────────────────────────── */
#content { padding: 28px; flex: 1; }

/* ── Stat Cards ──────────────────────────────────────────── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 28px;
}

.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px;
  position: relative;
  overflow: hidden;
  transition: transform var(--anim), box-shadow var(--anim), border-color var(--anim);
  cursor: default;
}

.stat-card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--card-color, var(--accent)) 0%, transparent 60%);
  opacity: .05;
  transition: opacity var(--anim);
}

.stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); border-color: var(--border2); }
.stat-card:hover::before { opacity: .1; }

.stat-icon {
  width: 42px; height: 42px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  margin-bottom: 14px;
}

.stat-label { font-size: 12px; color: var(--text2); font-weight: 600; letter-spacing: .05em; text-transform: uppercase; }
.stat-value { font-size: 30px; font-weight: 700; margin: 6px 0 4px; line-height: 1; font-variant-numeric: tabular-nums; }
.stat-sub { font-size: 12px; color: var(--text3); }

/* Counter animation */
.count-anim { transition: none; }

/* ── Section Headers ─────────────────────────────────────── */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.section-title { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }

/* ── Table List Grid ─────────────────────────────────────── */
.tables-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
  margin-bottom: 32px;
}

.table-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  cursor: pointer;
  transition: all var(--anim);
  text-decoration: none;
  display: block;
  position: relative;
  overflow: hidden;
}

.table-card::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform .3s cubic-bezier(.4,0,.2,1);
}

.table-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,.3); }
.table-card:hover::after { transform: scaleX(1); }

.tc-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
.tc-name { font-size: 14px; font-weight: 700; color: var(--text); }
.tc-icon { font-size: 22px; }
.tc-rows { font-size: 22px; font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: 2px; font-variant-numeric: tabular-nums; }
.tc-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; }
.tc-size { font-size: 12px; color: var(--text2); margin-top: 8px; display: flex; align-items: center; gap: 4px; }

.bar-track { height: 3px; background: var(--bg4); border-radius: 99px; margin-top: 10px; overflow: hidden; }
.bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width 1s cubic-bezier(.4,0,.2,1); }

/* ── Relationships Panel ─────────────────────────────────── */
.relationships-panel {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px;
  margin-bottom: 28px;
}

#rel-svg-wrap {
  width: 100%;
  overflow-x: auto;
  min-height: 200px;
}

#rel-svg-wrap svg { display: block; }

/* ── SQL Panel ───────────────────────────────────────────── */
.sql-panel {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 28px;
}

.sql-panel-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}

.sql-panel-header h3 { font-size: 14px; font-weight: 700; flex: 1; }

.sql-editor {
  width: 100%;
  padding: 16px 20px;
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13.5px;
  border: none; outline: none; resize: vertical;
  min-height: 100px;
  line-height: 1.7;
}

.sql-result {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
}

.sql-meta { font-size: 12px; color: var(--text2); margin-bottom: 10px; display: flex; gap: 16px; }

/* ── Data Table ──────────────────────────────────────────── */
.data-table-wrap {
  overflow-x: auto;
  border-radius: var(--radius-sm);
}

table.dt {
  width: 100%; border-collapse: collapse;
  font-size: 13px;
}

table.dt th {
  background: var(--bg3);
  color: var(--text2);
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .07em;
  padding: 10px 14px;
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
}

table.dt td {
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  max-width: 260px;
  overflow: hidden; text-overflow: ellipsis;
  color: var(--text);
}

table.dt tr:hover td { background: var(--bg3); }

.null-badge { color: var(--text3); font-style: italic; font-size: 12px; }

/* ── Skeleton loader ─────────────────────────────────────── */
@keyframes shimmer {
  0% { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}

.skeleton {
  border-radius: 6px;
  background: linear-gradient(90deg, var(--bg3) 25%, var(--bg4) 50%, var(--bg3) 75%);
  background-size: 800px 100%;
  animation: shimmer 1.5s infinite linear;
}

/* ── Animations ──────────────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; } to { opacity: 1; }
}

.anim-up { animation: fadeUp .4s cubic-bezier(.4,0,.2,1) both; }
.anim-in { animation: fadeIn .35s both; }

/* Stagger children */
.anim-stagger > * { animation: fadeUp .4s cubic-bezier(.4,0,.2,1) both; }
.anim-stagger > *:nth-child(1) { animation-delay: .04s; }
.anim-stagger > *:nth-child(2) { animation-delay: .08s; }
.anim-stagger > *:nth-child(3) { animation-delay: .12s; }
.anim-stagger > *:nth-child(4) { animation-delay: .16s; }
.anim-stagger > *:nth-child(5) { animation-delay: .20s; }
.anim-stagger > *:nth-child(6) { animation-delay: .24s; }
.anim-stagger > *:nth-child(n+7) { animation-delay: .28s; }

/* ── Pill Tags ───────────────────────────────────────────── */
.pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 9px; border-radius: 99px;
  font-size: 11px; font-weight: 600;
}
.pill-blue { background: rgba(99,102,241,.15); color: var(--accent); }
.pill-green { background: rgba(16,185,129,.15); color: var(--green); }
.pill-yellow { background: rgba(245,158,11,.15); color: var(--yellow); }
.pill-red { background: rgba(239,68,68,.15); color: var(--red); }
.pill-cyan { background: rgba(6,182,212,.15); color: var(--accent2); }

/* ── Toast ───────────────────────────────────────────────── */
#toast-wrap {
  position: fixed; bottom: 24px; right: 24px;
  display: flex; flex-direction: column; gap: 10px;
  z-index: 9999;
}

.toast {
  padding: 12px 18px;
  border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500;
  backdrop-filter: blur(12px);
  background: var(--bg2);
  border: 1px solid var(--border2);
  color: var(--text);
  box-shadow: var(--shadow);
  animation: slideIn .3s cubic-bezier(.4,0,.2,1) both;
  display: flex; align-items: center; gap: 8px;
}

.toast.success { border-color: var(--green); }
.toast.error   { border-color: var(--red); }

@keyframes slideIn {
  from { opacity: 0; transform: translateX(60px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* ── Theme toggle ────────────────────────────────────────── */
.theme-btn {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: all var(--anim);
}
.theme-btn:hover { background: var(--bg4); color: var(--text); }

/* ── Divider ─────────────────────────────────────────────── */
.divider { height: 1px; background: var(--border); margin: 24px 0; }

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 900px) {
  .stats-grid { grid-template-columns: repeat(2,1fr); }
}
@media (max-width: 640px) {
  #sidebar { transform: translateX(-100%); }
  #main { margin-left: 0; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>

<body>

<!-- ── Sidebar ──────────────────────────────────────────── -->
<aside id="sidebar">
  <div class="sidebar-header">
    <div class="logo-icon">🧵</div>
    <div>
      <div class="logo-text">UK Textiles</div>
      <div class="logo-sub">Database Studio</div>
    </div>
  </div>

  <div class="sidebar-search">
    <span class="search-icon">🔍</span>
    <input type="text" id="table-search" placeholder="Search tables…" autocomplete="off">
  </div>

  <div class="sidebar-label" style="padding:0 20px;margin-bottom:8px;">Tables</div>
  <div class="table-list" id="sidebar-list">
    <!-- populated by JS -->
    <div class="skeleton" style="height:36px;margin:4px 0;"></div>
    <div class="skeleton" style="height:36px;margin:4px 0;opacity:.7;"></div>
    <div class="skeleton" style="height:36px;margin:4px 0;opacity:.4;"></div>
  </div>

  <div class="sidebar-footer">
    <div class="connection-dot"></div>
    <div class="conn-text">Connected to <strong id="db-name-footer">…</strong></div>
    <button class="theme-btn" id="theme-toggle" title="Toggle theme">🌙</button>
  </div>
</aside>

<!-- ── Main ─────────────────────────────────────────────── -->
<main id="main">

  <!-- Top Bar -->
  <div id="topbar">
    <span class="topbar-title">
      Dashboard <span class="topbar-sub" id="topbar-sub">Loading…</span>
    </span>
    <button class="btn btn-ghost" onclick="openQueryPanel()">⚡ SQL Query</button>
    <button class="btn btn-ghost" onclick="showRelationships()">🔗 Relationships</button>
    <button class="btn btn-accent" onclick="refreshAll()">↻ Refresh</button>
  </div>

  <!-- Content -->
  <div id="content">

    <!-- Stat Cards -->
    <div class="stats-grid anim-stagger" id="stats-grid">
      <div class="stat-card skeleton" style="height:120px;"></div>
      <div class="stat-card skeleton" style="height:120px;opacity:.85;"></div>
      <div class="stat-card skeleton" style="height:120px;opacity:.7;"></div>
      <div class="stat-card skeleton" style="height:120px;opacity:.55;"></div>
    </div>

    <!-- SQL Panel (hidden by default) -->
    <div class="sql-panel" id="sql-panel" style="display:none;">
      <div class="sql-panel-header">
        <span>⚡</span>
        <h3>SQL Query Console</h3>
        <span class="pill pill-yellow">Read-only</span>
        <button class="btn btn-ghost" onclick="document.getElementById('sql-panel').style.display='none'">✕ Close</button>
        <button class="btn btn-accent" onclick="runQuery()">▶ Run</button>
      </div>
      <textarea class="sql-editor" id="sql-editor" placeholder="SELECT * FROM &quot;table_name&quot; LIMIT 10;&#10;-- Ctrl+Enter to run" rows="5" spellcheck="false"></textarea>
      <div class="sql-result" id="sql-result" style="display:none;"></div>
    </div>

    <!-- Relationships Panel (hidden by default) -->
    <div class="relationships-panel" id="rel-panel" style="display:none;">
      <div class="section-header">
        <div class="section-title">🔗 Schema Relationships</div>
        <button class="btn btn-ghost" onclick="document.getElementById('rel-panel').style.display='none'">✕ Close</button>
      </div>
      <div id="rel-svg-wrap"><div class="skeleton" style="height:220px;border-radius:10px;"></div></div>
    </div>

    <!-- Tables Section -->
    <div class="section-header anim-up" style="animation-delay:.1s">
      <div class="section-title">🗄️ Tables <span class="pill pill-blue" id="tbl-count-pill">—</span></div>
      <div style="display:flex;gap:8px;align-items:center;">
        <input type="text" id="grid-search" placeholder="Filter tables…"
          style="padding:7px 12px;border-radius:var(--radius-sm);background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:13px;outline:none;width:180px;"
          oninput="filterGrid(this.value)">
      </div>
    </div>

    <div class="tables-grid anim-stagger" id="tables-grid">
      <!-- populated -->
    </div>

  </div><!-- /content -->
</main>

<!-- Toast area -->
<div id="toast-wrap"></div>

<script>
/* ── State ─────────────────────────────────────────────── */
let overview = null;

/* ── Init ──────────────────────────────────────────────── */
async function init() {
  try {
    const res = await fetch('/api/overview');
    overview = await res.json();
    renderStats(overview);
    renderSidebar(overview.tables);
    renderGrid(overview.tables);
    document.getElementById('topbar-sub').textContent =
      `PostgreSQL · ${overview.db_name}`;
    document.getElementById('db-name-footer').textContent = overview.db_name;
  } catch(e) {
    toast('Failed to load database overview', 'error');
  }
}

/* ── Stats ─────────────────────────────────────────────── */
function renderStats(d) {
  const maxRows = Math.max(...d.tables.map(t => t.row_count), 1);
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card anim-up" style="--card-color:#6366f1;animation-delay:.05s">
      <div class="stat-icon" style="background:rgba(99,102,241,.15);color:#6366f1;">🗄️</div>
      <div class="stat-label">Total Tables</div>
      <div class="stat-value" data-target="${d.table_count}">0</div>
      <div class="stat-sub">${d.pg_version}</div>
    </div>
    <div class="stat-card anim-up" style="--card-color:#10b981;animation-delay:.1s">
      <div class="stat-icon" style="background:rgba(16,185,129,.15);color:#10b981;">📊</div>
      <div class="stat-label">Total Records</div>
      <div class="stat-value" data-target="${d.total_rows}">0</div>
      <div class="stat-sub">Across all tables</div>
    </div>
    <div class="stat-card anim-up" style="--card-color:#06b6d4;animation-delay:.15s">
      <div class="stat-icon" style="background:rgba(6,182,212,.15);color:#06b6d4;">💾</div>
      <div class="stat-label">Database Size</div>
      <div class="stat-value" style="font-size:22px;line-height:1.4;">${d.db_size}</div>
      <div class="stat-sub">Total on disk</div>
    </div>
    <div class="stat-card anim-up" style="--card-color:#f59e0b;animation-delay:.2s">
      <div class="stat-icon" style="background:rgba(245,158,11,.15);color:#f59e0b;">👤</div>
      <div class="stat-label">Connected As</div>
      <div class="stat-value" style="font-size:16px;line-height:2;">${d.db_user}</div>
      <div class="stat-sub" id="live-time"></div>
    </div>
  `;
  // Animate counters
  document.querySelectorAll('[data-target]').forEach(el => {
    animateCount(el, parseInt(el.dataset.target));
  });
  document.getElementById('tbl-count-pill').textContent = d.table_count;
  updateClock();
  setInterval(updateClock, 1000);
}

function updateClock() {
  const el = document.getElementById('live-time');
  if (el) el.textContent = new Date().toLocaleTimeString('en-GB');
}

function animateCount(el, target) {
  const dur = 1200, fps = 60, steps = dur / (1000 / fps);
  let cur = 0, step = 0;
  const inc = target / steps;
  const timer = setInterval(() => {
    step++;
    cur = Math.min(cur + inc, target);
    el.textContent = Math.round(cur).toLocaleString();
    if (step >= steps) clearInterval(timer);
  }, 1000 / fps);
}

/* ── Sidebar ───────────────────────────────────────────── */
function renderSidebar(tables) {
  const list = document.getElementById('sidebar-list');
  list.innerHTML = tables.map(t => `
    <a class="table-item" href="/table/${t.name}" data-name="${t.name}">
      <span class="table-icon">▦</span>
      <span>${t.name}</span>
      <span class="table-badge">${t.row_count.toLocaleString()}</span>
    </a>
  `).join('');

  document.getElementById('table-search').addEventListener('input', function() {
    const q = this.value.toLowerCase();
    document.querySelectorAll('#sidebar-list .table-item').forEach(el => {
      el.style.display = el.dataset.name.toLowerCase().includes(q) ? '' : 'none';
    });
  });
}

/* ── Table Grid ────────────────────────────────────────── */
function renderGrid(tables) {
  const maxRows = Math.max(...tables.map(t => t.row_count), 1);
  const grid = document.getElementById('tables-grid');
  grid.innerHTML = tables.map((t, i) => {
    const pct = Math.round((t.row_count / maxRows) * 100);
    return `
    <a class="table-card" href="/table/${t.name}" data-name="${t.name}"
       style="animation-delay:${.03 * i}s">
      <div class="tc-top">
        <div class="tc-name">${t.name}</div>
        <div class="tc-icon">🗂️</div>
      </div>
      <div class="tc-rows">${t.row_count.toLocaleString()}</div>
      <div class="tc-label">rows</div>
      <div class="tc-size">💾 ${t.size}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:0%" data-pct="${pct}"></div>
      </div>
    </a>`;
  }).join('');

  // Animate bars
  setTimeout(() => {
    document.querySelectorAll('.bar-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  }, 100);
}

function filterGrid(q) {
  q = q.toLowerCase();
  document.querySelectorAll('#tables-grid .table-card').forEach(el => {
    el.style.display = el.dataset.name.toLowerCase().includes(q) ? '' : 'none';
  });
}

/* ── SQL Panel ─────────────────────────────────────────── */
function openQueryPanel() {
  const p = document.getElementById('sql-panel');
  p.style.display = p.style.display === 'none' ? '' : 'none';
  if (p.style.display !== 'none') {
    document.getElementById('sql-editor').focus();
    p.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

async function runQuery() {
  const sql = document.getElementById('sql-editor').value.trim();
  if (!sql) return;
  const resultDiv = document.getElementById('sql-result');
  resultDiv.style.display = 'block';
  resultDiv.innerHTML = '<div class="skeleton" style="height:60px;"></div>';

  try {
    const res = await fetch('/api/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sql })
    });
    const data = await res.json();

    if (data.error) {
      resultDiv.innerHTML = `<div class="pill pill-red" style="padding:8px 14px;font-size:13px;">⚠ ${escHtml(data.error)}</div>`;
      return;
    }

    if (data.columns) {
      const meta = `<div class="sql-meta">
        <span>✓ ${data.row_count} row(s)</span>
        <span>⏱ ${data.elapsed_ms}ms</span>
        <button class="btn btn-ghost" style="padding:3px 10px;font-size:11px;" onclick="exportQueryCSV()">⬇ CSV</button>
      </div>`;
      const hdr = data.columns.map(c => `<th>${escHtml(c)}</th>`).join('');
      const body = data.rows.map(r =>
        `<tr>${r.map(v => `<td>${v === null ? '<span class="null-badge">NULL</span>' : escHtml(String(v))}</td>`).join('')}</tr>`
      ).join('');
      resultDiv.innerHTML = `${meta}<div class="data-table-wrap"><table class="dt"><tr>${hdr}</tr>${body}</table></div>`;
      window._lastQueryData = data;
    } else {
      resultDiv.innerHTML = `<div class="pill pill-green" style="padding:8px 14px;font-size:13px;">✓ ${escHtml(data.message)} (${data.elapsed_ms}ms)</div>`;
    }
  } catch(e) {
    resultDiv.innerHTML = `<div class="pill pill-red" style="padding:8px 14px;font-size:13px;">⚠ Network error</div>`;
  }
}

function exportQueryCSV() {
  const d = window._lastQueryData;
  if (!d) return;
  const rows = [d.columns, ...d.rows.map(r => r.map(v => v === null ? '' : String(v)))];
  const csv = rows.map(r => r.map(v => `"${v.replace(/"/g,'""')}"`).join(',')).join('\n');
  downloadText(csv, 'query_result.csv', 'text/csv');
}

/* ── Relationships ─────────────────────────────────────── */
async function showRelationships() {
  const p = document.getElementById('rel-panel');
  p.style.display = p.style.display === 'none' ? '' : 'none';
  if (p.style.display === 'none') return;
  p.scrollIntoView({ behavior: 'smooth', block: 'start' });

  const res = await fetch('/api/relationships');
  const data = await res.json();
  renderRelSVG(data);
}

function renderRelSVG(data) {
  const wrap = document.getElementById('rel-svg-wrap');
  const nodes = data.nodes;
  const edges = data.edges;

  if (!nodes.length) { wrap.innerHTML = '<p style="color:var(--text2);padding:20px;">No tables found.</p>'; return; }
  if (!edges.length) { wrap.innerHTML = '<p style="color:var(--text2);padding:20px;">No foreign key relationships defined in this schema.</p>'; return; }

  // Simple force-like layout: arrange nodes in a grid
  const cols = Math.ceil(Math.sqrt(nodes.length));
  const W = 170, H = 60, PX = 60, PY = 70;
  const positions = {};
  nodes.forEach((n, i) => {
    const col = i % cols, row = Math.floor(i / cols);
    positions[n] = { x: col * (W + PX) + 20, y: row * (H + PY) + 20 };
  });

  const svgW = cols * (W + PX) + 20;
  const svgH = (Math.ceil(nodes.length / cols)) * (H + PY) + 20;

  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const nodeColor = isDark ? '#1a1b23' : '#f0f2f8';
  const borderColor = isDark ? '#6366f1' : '#6366f1';
  const textColor = isDark ? '#e8eaf0' : '#111827';
  const lineColor = '#6366f1';

  let svgEdges = '';
  edges.forEach(e => {
    const s = positions[e.src_table], t = positions[e.ref_table];
    if (!s || !t) return;
    const sx = s.x + W, sy = s.y + H/2;
    const tx = t.x, ty = t.y + H/2;
    const cx = (sx + tx) / 2;
    svgEdges += `
      <path d="M${sx},${sy} C${cx},${sy} ${cx},${ty} ${tx},${ty}"
        fill="none" stroke="${lineColor}" stroke-width="1.5" opacity=".6"
        marker-end="url(#arrow)"/>`;
  });

  let svgNodes = '';
  nodes.forEach(n => {
    const {x, y} = positions[n];
    const hasEdge = edges.some(e => e.src_table===n || e.ref_table===n);
    const fill = hasEdge ? nodeColor : (isDark ? '#111218' : '#fff');
    const stroke = hasEdge ? borderColor : (isDark ? '#22232e' : '#e5e7eb');
    svgNodes += `
      <a href="/table/${n}" target="_self">
        <rect x="${x}" y="${y}" width="${W}" height="${H}" rx="10"
          fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
        <text x="${x + W/2}" y="${y + H/2 + 5}" text-anchor="middle"
          font-family="Inter,sans-serif" font-size="12" font-weight="600"
          fill="${hasEdge ? borderColor : textColor}">${n}</text>
      </a>`;
  });

  wrap.innerHTML = `
    <svg width="${svgW}" height="${svgH}" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="8" refX="8" refY="4"
          orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L8,4 L0,8 L2,4 Z" fill="${lineColor}"/>
        </marker>
      </defs>
      ${svgEdges}${svgNodes}
    </svg>`;
}

/* ── Refresh ───────────────────────────────────────────── */
async function refreshAll() {
  document.getElementById('stats-grid').innerHTML =
    Array(4).fill('<div class="stat-card skeleton" style="height:120px;"></div>').join('');
  await init();
  toast('Refreshed successfully', 'success');
}

/* ── Keyboard shortcuts ────────────────────────────────── */
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    const panel = document.getElementById('sql-panel');
    if (panel.style.display !== 'none') runQuery();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('table-search').focus();
  }
});

/* ── Theme ─────────────────────────────────────────────── */
const themeBtn = document.getElementById('theme-toggle');
themeBtn.addEventListener('click', () => {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  themeBtn.textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
});
const saved = localStorage.getItem('theme');
if (saved) {
  document.documentElement.setAttribute('data-theme', saved);
  themeBtn.textContent = saved === 'dark' ? '🌙' : '☀️';
}

/* ── Helpers ───────────────────────────────────────────── */
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, type = 'success') {
  const w = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `${type==='success'?'✓':'⚠'} ${msg}`;
  w.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function downloadText(content, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], {type: mime}));
  a.download = filename; a.click();
}

init();
</script>
</body>
</html>
